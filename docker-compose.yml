# SENTINEL docker-compose.yml
# Starts: SENTINEL FastAPI server (port 8000), Gradio dashboard (port 7860), ChromaDB (port 8001)
# Usage: docker-compose up
# All services start within 120 seconds and restart on failure (max 3 retries).

version: "3.9"

services:

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - sentinel-net
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  sentinel-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn sentinel.api.server:app --host 0.0.0.0 --port 8000
    environment:
      - SENTINEL_DEBUG=false
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8001
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - sentinel-net
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  gradio-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    command: python demo/app.py
    environment:
      - SENTINEL_SERVER_URL=http://sentinel-server:8000
    depends_on:
      sentinel-server:
        condition: service_healthy
    networks:
      - sentinel-net
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

networks:
  sentinel-net:
    driver: bridge

volumes:
  chroma-data:
